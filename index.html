<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Travel Support</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;
      background:url("https://images.pexels.com/photos/20409358/pexels-photo-20409358.jpeg") center/cover no-repeat;color:#fff}
    .overlay{position:absolute;inset:0;background:rgba(0,0,0,.55)}
    .container{position:relative;z-index:2;max-width:520px;padding:40px 30px}
    h1,p,label,select,button{text-align:left}
    select{padding:6px 8px;margin:12px 0 18px}
    .langBtn,.authBtn{margin-right:8px;padding:8px 16px;border:none;cursor:pointer;border-radius:4px;font-weight:bold}
    .langBtn{background:#399e46;color:#fff;opacity:.6}
    .langBtn.active{opacity:1;background:#ffcc00;color:#000}
    .authBtn{background:#0078d4;color:#fff}
    #status{margin-top:10px;font-weight:bold}
  </style>
</head>
<body>
  <!-- ---------- UI ---------- -->
  <div class="overlay"></div>
  <div class="container">
    <div>
      <button class="langBtn" id="enBtn" data-lang="en">English</button>
      <button class="langBtn" id="frBtn" data-lang="fr">Français</button>
    </div>
    <h1 id="mainTitle"></h1>
    <p id="mainText"></p>
    <label id="brandLabel" for="brandSelect"></label>
    <select id="brandSelect">
      <option value="UP">UP</option>
      <option value="GO">GO</option>
    </select><br />
    <button class="authBtn" id="loginBtn"></button>
    <button class="authBtn" id="logoutBtn" style="display:none;"></button>
    <div id="status"></div>
  </div>

  <!-- MSAL ----------------------------------------------------------- -->
  <script src="https://alcdn.msauth.net/browser/2.25.0/js/msal-browser.min.js"></script>
  <script>
    /* ---------------- GLOBAL STATE ---------------- */
    let currentLanguage = localStorage.getItem("lang") || "en";
    let brandValue      = localStorage.getItem("brand") || "UP";
    let userName        = "";
    let userId          = "";
    window.currentLanguage = currentLanguage;   // used inside lcw()

    /* ---------------- MSAL CONFIG ----------------- */
    const clientApplication = new msal.PublicClientApplication({
      auth:{ clientId:"7811612f-d1b3-4226-806a-4700a8a9669c",
             authority:"https://login.microsoftonline.com/67ac26e0-cfa4-4273-bf20-46627500a25d" }
    });

    function updateUserId(){
      const acc = clientApplication.getActiveAccount();
      userId = acc ? acc.username : "";
    }

    /* ---------------- UI TEXTS -------------------- */
    const T={
      en:{h:"We help you on every journey",
          p:"Whatever you travel by, you can count on our support everywhere and anytime.",
          b:"Brand:",in:"Log in with Microsoft",out:"Sign out",s:"Signed in as "},
      fr:{h:"Nous vous aidons dans chaque voyage",
          p:"Quel que soit votre mode de voyage, vous pouvez compter sur notre soutien partout et à tout moment.",
          b:"Marque :",in:"Se connecter avec Microsoft",out:"Se déconnecter",s:"Connecté : "}
    };
    function render(){
      const t=T[currentLanguage];
      mainTitle.innerText=t.h; mainText.innerText=t.p; brandLabel.innerText=t.b;
      loginBtn.innerText=t.in; logoutBtn.innerText=t.out;
      document.querySelectorAll(".langBtn")
              .forEach(b=>b.classList.toggle("active",b.dataset.lang===currentLanguage));
      showStatus();
    }
    function showStatus(){
      if(userName){status.innerText=T[currentLanguage].s+userName;
                   loginBtn.style.display="none"; logoutBtn.style.display="";}
      else        {status.innerText=""; loginBtn.style.display=""; logoutBtn.style.display="none";}
    }
    render();

    /* ---------------- EVENTS ---------------------- */
    enBtn.onclick=()=>{localStorage.setItem("lang","en");location.reload();}
    frBtn.onclick=()=>{localStorage.setItem("lang","fr");location.reload();}
    brandSelect.value=brandValue;
    brandSelect.onchange=e=>{localStorage.setItem("brand",e.target.value);location.reload();};

    /* ---------------- LOGIN/LOGOUT ---------------- */
    loginBtn.onclick=async()=>{
      try{
        const r=await clientApplication.loginPopup({scopes:["user.read"]});
        if(r?.account){clientApplication.setActiveAccount(r.account);
                       userName=r.account.name||"";updateUserId();
                       sessionStorage.setItem("reloaded","1");location.reload();}
      }catch(e){console.log(e);}
    };
    logoutBtn.onclick=async()=>{
      try{await clientApplication.logoutPopup({account:clientApplication.getActiveAccount()});}catch(e){}
      sessionStorage.setItem("reloaded","1");location.reload();
    };
    (function restore(){
      if(sessionStorage.getItem("reloaded")){
        sessionStorage.removeItem("reloaded");
        const acc=clientApplication.getAllAccounts()[0];
        if(acc){clientApplication.setActiveAccount(acc);userName=acc.name||"";updateUserId();}
        render();
      }
    })();

    /* ---------------- CHAT CONTEXT ---------------- */
    function buildContext(){
      return {
        UserLanguage : currentLanguage==="fr" ? "French" : "English",
        Brand        : brandValue,
        Email        : userId,
        Sub          : userId==="" ? "" : "15833b70-5062-f011-bec1-0022480a4751"
      };
    }
  </script>

  <!-- TOKEN PROVIDER (works for both modes) --------------------------- -->
  <script>
    const auth={};
    auth.getAuthenticationToken=function(callback){
      const ctx=buildContext();

      /* Anonymous => tell LCW we have no token */
      if(!ctx.Sub){
        console.log("Anonymous user → no JWT returned.");
        callback(null);          // MUST be null, not empty string
        return;
      }

      /* Authenticated => fetch token from backend */
      const xhr=new XMLHttpRequest();
      xhr.onreadystatechange=function(){
        if(this.readyState===4){
          if(this.status===200){console.log("JWT received");callback(this.responseText);}
          else                 {console.error("JWT error, status:",this.status);callback(null);}
        }
      };
      xhr.onerror=e=>{console.error("XHR error:",e);callback(null);}
      const url=`/privatekey?email=${encodeURIComponent(ctx.Email)}&brand=${encodeURIComponent(ctx.Brand)}&language=${encodeURIComponent(ctx.UserLanguage)}&sub=${encodeURIComponent(ctx.Sub)}`;
      xhr.open("GET",url,true);xhr.send();
    };
  </script>

  <!-- LCW CUSTOMISATION (style + localisation) ------------------------ -->
  <script>
    function lcw(){
      /* --- Build localisation dictionary depending on currentLanguage --- */
      const localized_texts = (window.currentLanguage==="fr") ? {
        webchatTitle:"Assistant virtuel",
        webchatChatButton:"Clavarder",
        webchatAlertTitle:"Êtes-vous certain de vouloir quitter la séance de clavardage ?",
        webchatAlertMessage:"Note : Cela mettra fin à la conversation et vous perdrez votre historique de clavardage.",
        webchatNoButton:"Non",
        webchatYesButton:"Oui",
        webchatLoadingPaneTitle:"Bienvenue au",
        webchatLoadingPaneSubTitle:"Soutien par clavardage en direct !",
        webchatLoadingPaneSpinnerText:"Chargement…"
      } : { /* English (default) */
        webchatTitle:"Virtual Assistant",
        webchatChatButton:"Chat",
        webchatAlertTitle:"Are you sure you want to exit the chat?",
        webchatAlertMessage:"Note: This will end your conversation, and you will lose your chat history.",
        webchatNoButton:"No",
        webchatYesButton:"Yes",
        webchatLoadingPaneTitle:"Welcome to",
        webchatLoadingPaneSubTitle:"Live Chat Support!",
        webchatLoadingPaneSpinnerText:"Loading…"
      };

      /* --- Return customisation object expected by LCW ------------------ */
      return {
        localizationProps : localized_texts,
        styleProps:{
          generalStyles:{borderRadius:"10px"}
        },
        headerProps:{styleProps:{generalStyleProps:{borderRadius:"10px 10px 0 0"}}},
        chatButtonProps:{
          controlProps:{hideChatTextContainer:true},
          styleProps:{generalStyleProps:{minWidth:"60px",width:"60px",height:"60px"}}
        },
        webChatContainerProps:{
          webChatStyles:{avatarSize:0,suggestedActionBackgroundColor:"black",suggestedActionBorderColor:"black"},
          renderingMiddlewareProps:{disableAvatarMiddleware:true,avatarTextStyleProps:{display:"none"}}
        },
        loadingPaneProps:{
          controlProps:{titleText:localized_texts.webchatLoadingPaneTitle,
                        subtitleText:localized_texts.webchatLoadingPaneSubTitle,
                        hideSpinnerText:true,spinnerSize:3}
        },
        footerProps:{controlProps:{hideEmailTranscriptButton:false,
                                   hideAudioNotificationButton:true,
                                   rightGroup:{children:["© Microsoft 2023"]}}}
      };
    }
  </script>

  <!-- LIVE CHAT BOOTSTRAPPER ------------------------------------------ -->
  <script id="Microsoft_Omnichannel_LCWidget"
          src="https://oc-cdn-ocprod.azureedge.net/livechatwidget/scripts/LiveChatBootstrapper.js"
          data-app-id="99c9d54a-c161-4575-9b89-d416cb1829f6"
          data-lcw-version="prod"
          data-org-id="ee50331d-bd60-f011-8ee3-6045bd08ce00"
          data-org-url="https://m-ee50331d-bd60-f011-8ee3-6045bd08ce00.us.omnichannelengagementhub.com"
          data-customization-callback="lcw">
  </script>

  <!-- lcw:ready -> register token provider + start chat ---------------- -->
  <script>
    window.addEventListener("lcw:ready",()=>{
      /* Always register provider – it will decide itself what to return */
      Microsoft.Omnichannel.LiveChatWidget.SDK.setAuthTokenProvider(auth.getAuthenticationToken);

      Microsoft.Omnichannel.LiveChatWidget.SDK.startChat({
        inNewWindow:false,
        customContext:buildContext()
      });
    });
  </script>
</body>
</html>
