<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Support</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- Page background & basic styles --------------------------------------------------- -->
  <style>
    html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;
      background:url("https://images.pexels.com/photos/20409358/pexels-photo-20409358.jpeg") center/cover no-repeat;
      color:#fff}
    .overlay{position:absolute;inset:0;background:rgba(0,0,0,.55)}
    .container{position:relative;z-index:2;max-width:520px;padding:40px 30px}
    h1,p,label,select,button{text-align:left}
    select{padding:6px 8px;margin:12px 0 18px}
    .langBtn,.authBtn{margin-right:8px;padding:8px 16px;border:none;cursor:pointer;border-radius:4px;font-weight:bold}
    .langBtn{background:#399e46;color:#fff;opacity:.6}
    .langBtn.active{opacity:1;background:#ffcc00;color:#000}
    .authBtn{background:#0078d4;color:#fff}
    #status{margin-top:10px;font-weight:bold}
  </style>
</head>

<body>
  <!-- --------------------------------------------------------------- -->
  <!--  UI (language switch, login buttons etc.)                      -->
  <!-- --------------------------------------------------------------- -->
  <div class="overlay"></div>
  <div class="container">
    <div>
      <button class="langBtn" id="enBtn" data-lang="en">English</button>
      <button class="langBtn" id="frBtn" data-lang="fr">Français</button>
    </div>
    <h1 id="mainTitle"></h1>
    <p id="mainText"></p>
    <label id="brandLabel" for="brandSelect"></label>
    <select id="brandSelect">
      <option value="UP">UP</option>
      <option value="GO">GO</option>
    </select><br>
    <button class="authBtn" id="loginBtn"></button>
    <button class="authBtn" id="logoutBtn" style="display:none;"></button>
    <div id="status"></div>
  </div>

  <!-- MSAL (Microsoft identity, used for SSO) ----------------------------------------- -->
  <script src="https://alcdn.msauth.net/browser/2.25.0/js/msal-browser.min.js"></script>
  <script>
    /* =========================================================================
       GLOBAL STATE
       ========================================================================= */
    let currentLanguage = localStorage.getItem("lang") || "en";
    let brandValue      = localStorage.getItem("brand") || "UP";
    let userName        = "";
    var userId          = "";      // e-mail – used as userId for LCW
    window.currentLanguage = currentLanguage; // used inside lcw() for localisation

    /* =========================================================================
       MSAL CONFIGURATION (STEP-1)
       ========================================================================= */
    var clientApplication;
    (function () {
      const msalConfig = {
        auth: {
          clientId : '7811612f-d1b3-4226-806a-4700a8a9669c',
          authority: 'https://login.microsoftonline.com/67ac26e0-cfa4-4273-bf20-46627500a25d'
        }
      };
      clientApplication = new msal.PublicClientApplication(msalConfig);
    })();

    /* =========================================================================
       USER-ID CREATION  (STEP-3)
       ========================================================================= */
    function updateUserId(){
      const acc = clientApplication.getActiveAccount();
      if(!acc){ userId=""; return;}
      userId = acc.username; // keep it simple – username will be our id
    }

    /* =========================================================================
       UI TEXTS (multi-lingual)
       ========================================================================= */
    const T = {
      en:{h:"We help you on every journey",
          p:"Whatever you travel by, you can count on our support everywhere and anytime.",
          b:"Brand:",
          in:"Log in with Microsoft",
          out:"Sign out",
          s:"Signed in as "},
      fr:{h:"Nous vous aidons dans chaque voyage",
          p:"Quel que soit votre mode de voyage, vous pouvez compter sur notre soutien partout et à tout moment.",
          b:"Marque :",
          in:"Se connecter avec Microsoft",
          out:"Se déconnecter",
          s:"Connecté : "}
    };
    function render(){
      const t=T[currentLanguage];
      mainTitle.innerText = t.h;
      mainText.innerText  = t.p;
      brandLabel.innerText= t.b;
      loginBtn.innerText  = t.in;
      logoutBtn.innerText = t.out;
      document.querySelectorAll(".langBtn")
              .forEach(b=>b.classList.toggle("active",b.dataset.lang===currentLanguage));
      showStatus();
    }
    function showStatus(){
      const st=status;
      if(userName){
        st.innerText = T[currentLanguage].s + userName;
        loginBtn.style.display="none"; logoutBtn.style.display="";
      }else{
        st.innerText=""; loginBtn.style.display=""; logoutBtn.style.display="none";
      }
    }
    render();

    /* =========================================================================
       EVENTS (switch lang / brand)
       ========================================================================= */
    enBtn.onclick = () => {localStorage.setItem("lang","en"); location.reload();}
    frBtn.onclick = () => {localStorage.setItem("lang","fr"); location.reload();}
    brandSelect.value = brandValue;
    brandSelect.addEventListener("change",e=>{
      localStorage.setItem("brand",e.target.value); location.reload();
    });

    /* =========================================================================
       LOGIN / LOGOUT
       ========================================================================= */
    loginBtn.onclick = async () =>{
      try{
        const r = await clientApplication.loginPopup({scopes:["user.read"]});
        if(r?.account){
          clientApplication.setActiveAccount(r.account);
          userName = r.account.name||"";
          updateUserId();
          sessionStorage.setItem("reloaded","1");
          location.reload();
        }
      }catch(e){console.log(e);}
    };
    logoutBtn.onclick = async ()=>{
      try{await clientApplication.logoutPopup({account:clientApplication.getActiveAccount()});}
      catch(e){}
      sessionStorage.setItem("reloaded","1"); location.reload();
    };
    (function restore(){
      if(sessionStorage.getItem("reloaded")){
        sessionStorage.removeItem("reloaded");
        const acc = clientApplication.getAllAccounts()[0];
        if(acc){clientApplication.setActiveAccount(acc); userName=acc.name||""; updateUserId();}
        render();
      }
    })();

    /* =========================================================================
       CHAT CONTEXT OBJECT (sent to Copilot Studio)
       ========================================================================= */
    function buildContext(){
      const ctx={
        UserLanguage : (localStorage.getItem("lang")==="fr"?"French":"English"),
        Brand        : localStorage.getItem("brand"),
        Email        : userId,
        // If userId is empty – user is anonymous and Sub is left blank
        Sub          : userId===""? "": "15833b70-5062-f011-bec1-0022480a4751"
      };
      return ctx;
    }
  </script>

  <!-- =========================================================================
       TOKEN PROVIDER  (called by Dynamics if user is authenticated)
       ========================================================================= -->
  <script>
    var auth = {};
    auth.getAuthenticationToken = function (callback){
      const customContext = buildContext();

      // Anonymous user – just run the chat without JWT/token
      if(customContext.Sub === ""){
        console.log("No authenticated user. Running chat anonymously.");
        callback(""); // callback with empty string fulfils Dynamics contract
        return;
      }

      // Authenticated user – request JWT from our backend
      const xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function(){
        if(this.readyState === 4){
          if(this.status === 200){
            console.log("JWT received:",this.responseText);
            callback(this.responseText);  // pass token back to LCW
          }else{
            console.error("JWT request failed – status:",this.status);
            callback(null);
          }
        }
      };
      xhttp.onerror = err =>{ console.error("XHR error:",err); callback(null); };

      const url=`/privatekey?email=${encodeURIComponent(customContext.Email)}&brand=${encodeURIComponent(customContext.Brand)}&language=${encodeURIComponent(customContext.UserLanguage)}&sub=${encodeURIComponent(customContext.Sub)}`;
      xhttp.open("GET",url,true);
      xhttp.send();
    };
  </script>

  <!-- =========================================================================
       LCW CUSTOMISATION FUNCTION  (colour, texts, etc.)
       ========================================================================= -->
  <script>
    function lcw(){
      /* ----------- localisation (based on currentLanguage) ---------------- */
      let localized_texts = {
        webchatTitle              : "Virtual Assistant",
        webchatChatButton         : "Chat",
        webchatAlertTitle         : "Are you sure you want to exit the chat?",
        webchatAlertMessage       : "Note: This will end your conversation, and you will lose your chat history.",
        webchatNoButton           : "No",
        webchatYesButton          : "Yes",
        webchatLoadingPaneTitle   : "Welcome to",
        webchatLoadingPaneSubTitle: "Live Chat Support!",
        webchatLoadingPaneSpinnerText: "Loading…"
      };

      if(window.currentLanguage === "fr"){          // French version
        localized_texts.webchatTitle                = "Assistant virtuel";
        localized_texts.webchatChatButton           = "Clavarder";
        localized_texts.webchatAlertTitle           = "Êtes-vous certain de vouloir quitter la séance de clavardage?";
        localized_texts.webchatAlertMessage         = "Note : Cela mettra fin à la conversation et vous perdrez votre historique de clavardage.";
        localized_texts.webchatNoButton             = "Non";
        localized_texts.webchatYesButton            = "Oui";
        localized_texts.webchatLoadingPaneTitle     = "Bienvenue au";
        localized_texts.webchatLoadingPaneSubTitle  = "Soutien par clavardage en direct!";
        localized_texts.webchatLoadingPaneSpinnerText="Chargement…";
      }

      /* ----------- Style & other props ------------------------------------ */
      return {
        styleProps:{
          generalStyles:{borderRadius:"10px"}
        },
        headerProps:{
          styleProps:{generalStyleProps:{borderRadius:"10px 10px 0 0"}}
        },
        chatButtonProps:{
          controlProps:{hideChatTextContainer:true},
          styleProps:{generalStyleProps:{minWidth:"60px",width:"60px",height:"60px"}}
        },
        webChatContainerProps:{
          webChatStyles:{
            avatarSize:0,
            suggestedActionBackgroundColor:"black",
            suggestedActionBorderColor:"black"
          },
          renderingMiddlewareProps:{
            disableAvatarMiddleware:true,
            avatarTextStyleProps:{display:"none"}
          }
        },
        loadingPaneProps:{
          controlProps:{
            titleText   : localized_texts.webchatLoadingPaneTitle,
            subtitleText: localized_texts.webchatLoadingPaneSubTitle,
            hideSpinnerText:true,
            spinnerSize:3
          }
        },
        footerProps:{
          controlProps:{
            hideEmailTranscriptButton:false,
            hideAudioNotificationButton:true,
            rightGroup:{children:["© Microsoft 2023"]}
          }
        },
        // expose actual texts to LCW localisation engine
        ...localized_texts
      };
    }
  </script>

  <!-- =========================================================================
       LIVE CHAT WIDGET BOOTSTRAPPER
       (set data-customization-callback="lcw" so our function runs)
       ========================================================================= -->
  <script id="Microsoft_Omnichannel_LCWidget"
          src="https://oc-cdn-ocprod.azureedge.net/livechatwidget/scripts/LiveChatBootstrapper.js"
          data-app-id="99c9d54a-c161-4575-9b89-d416cb1829f6"
          data-lcw-version="prod"
          data-org-id="ee50331d-bd60-f011-8ee3-6045bd08ce00"
          data-org-url="https://m-ee50331d-bd60-f011-8ee3-6045bd08ce00.us.omnichannelengagementhub.com"
          data-customization-callback="lcw">
  </script>

  <!-- =========================================================================
       lcw:ready      – widget fully loaded
       Here we decide whether to work authenticated or not.
       ========================================================================= -->
  <script>
    window.addEventListener("lcw:ready",() => {
      const customContext = buildContext();
      const isAuthenticated = !!customContext.Sub;   // Sub present → user is signed-in

      // Register token provider only for authenticated users
      if(isAuthenticated){
        Microsoft.Omnichannel.LiveChatWidget.SDK.setAuthTokenProvider(auth.getAuthenticationToken);
      }

      // Start the chat (works the same for both cases)
      Microsoft.Omnichannel.LiveChatWidget.SDK.startChat({
        inNewWindow:false,
        customContext
      });
    });
  </script>
</body>
</html>
